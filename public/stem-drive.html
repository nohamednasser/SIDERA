        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }

        .preview-header h2 { margin: 0; font-size: 1.1rem; }

    </style>
</head>

let db, currentGrade = 'All', currentSub = 'All';
// FIX: Store file as Blob reference, NOT base64 string
let uploadedFileBlob = null, uploadedFileName = "", uploadedFileType = "", uploadedFileSize = 0;

function formatSize(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

class StorageManager {
    static init() {
        return new Promise((resolve, reject) => {
            // FIX: V10 schema - separate stores for metadata and file blobs
            const request = indexedDB.open("SideraDrive_V10", 1);
            request.onupgradeneeded = e => {
                const database = e.target.result;
                if (!database.objectStoreNames.contains("files")) {
                    database.createObjectStore("files", { keyPath: "id", autoIncrement: true });
                }
                if (!database.objectStoreNames.contains("blobs")) {
                    database.createObjectStore("blobs", { keyPath: "id" });
                }
            };
            request.onsuccess = e => { db = e.target.result; this.requestPersistence(); resolve(db); };
            request.onerror = () => { console.error('IndexedDB failed'); reject(); };
        });
    }

    static requestPersistence() {
        if (navigator.storage && navigator.storage.persist) navigator.storage.persist();
    }

    static async getAllData() {
        return new Promise((resolve) => {
            const tx = db.transaction("files", "readonly");
            tx.objectStore("files").getAll().onsuccess = (e) => resolve(e.target.result || []);
        });
    }

    static async getBlob(id) {
        return new Promise((resolve) => {
            const tx = db.transaction("blobs", "readonly");
            const req = tx.objectStore("blobs").get(id);
            req.onsuccess = (e) => resolve(e.target.result ? e.target.result.blob : null);
            req.onerror = () => resolve(null);
        });
    }

    // FIX: Store file as native Blob - no base64 conversion, no memory explosion
    static async saveData(entry, fileBlob, onProgress) {
        return new Promise((resolve, reject) => {
            onProgress?.(20);
            const tx = db.transaction(["files", "blobs"], "readwrite");
            const filesStore = tx.objectStore("files");
            const blobsStore = tx.objectStore("blobs");

            const addReq = filesStore.add(entry);
            addReq.onsuccess = (e) => {
                const newId = e.target.result;
                onProgress?.(50);
                if (fileBlob) {
                    // Store blob separately with same ID
                    const blobReq = blobsStore.put({ id: newId, blob: fileBlob });
                    blobReq.onsuccess = () => { onProgress?.(100); resolve(newId); };
                    blobReq.onerror = () => reject(new Error('Blob save failed'));
                } else {
                    onProgress?.(100);
                    resolve(newId);
                }
            };
            addReq.onerror = () => reject(new Error('Entry save failed'));
        });
    }

    static async deleteData(id) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction(["files", "blobs"], "readwrite");
            tx.objectStore("files").delete(id);
            tx.objectStore("blobs").delete(id);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject();
        });
    }

    // Migrate from V9 to V10 if needed
    static async migrateFromV9() {
        return new Promise((resolve) => {
            const request = indexedDB.open("SideraDrive_V9", 1);
            request.onsuccess = async (e) => {
                const oldDb = e.target.result;
                if (!oldDb.objectStoreNames.contains("files")) { oldDb.close(); resolve(); return; }
                const tx = oldDb.transaction("files", "readonly");
                tx.objectStore("files").getAll().onsuccess = async (ev) => {
                    const oldItems = ev.target.result || [];
                    oldDb.close();
                    if (oldItems.length === 0) { resolve(); return; }
                    
                    for (const item of oldItems) {
                        const url = item.url || '';
                        let blob = null;
                        const meta = {
                            title: item.title,
                            grade: item.grade,
                            subject: item.subject,
                            desc: item.desc,
                            type: item.type,
                            fileName: item.fileName,
                            fileSize: 0,
                            fileType: '',
                            createdAt: item.createdAt
                        };
                        if (url.startsWith('data:')) {
                            // Convert base64 back to blob
                            try {
                                const resp = await fetch(url);
                                blob = await resp.blob();
                                meta.fileSize = blob.size;
                                meta.fileType = blob.type;
                                meta.url = '';
                            } catch(err) {
                                meta.url = '';
                            }
                        } else {
                            meta.url = url;
                        }
                        await StorageManager.saveData(meta, blob, () => {});
                    }
                    // Delete old DB after migration
                    indexedDB.deleteDatabase("SideraDrive_V9");
                    resolve();
                };
                tx.onerror = () => { oldDb.close(); resolve(); };
            };
            request.onerror = () => resolve();
        });
    }
}

function showUploadProgress(show = true) {
    const container = document.getElementById('progressContainer');
    if (show) container.classList.add('show');
    else setTimeout(() => container.classList.remove('show'), 500);
}

function updateUploadProgress(percent, sizeInfo) {
    document.getElementById('progressFill').style.width = percent + '%';
    document.getElementById('progressPercent').textContent = Math.round(percent);
    if (sizeInfo) document.getElementById('progressSizeInfo').textContent = sizeInfo;
}

function openPreview(itemId) {
    const tx = db.transaction("files", "readonly");
    tx.objectStore("files").get(itemId).onsuccess = async (e) => {
        const item = e.target.result;
        if (!item) return;
        const modal = document.getElementById('previewModal');
        const previewBody = document.getElementById('previewBody');
        const previewTitle = document.getElementById('previewTitle');
        previewTitle.textContent = item.fileName || item.title;
        previewBody.innerHTML = '<p>Loading preview...</p>';
        modal.classList.add('show');

        if (item.url && !item.url.startsWith('data:') && item.url !== '') {
            // External link
            const url = item.url;
            if (url.includes('drive.google.com')) {
                const fileId = url.match(/\/d\/([a-zA-Z0-9-_]+)/)?.[1];
                if (fileId) previewBody.innerHTML = '<iframe src="https://drive.google.com/file/d/' + fileId + '/preview" style="width:100%;height:100%;border:none;"></iframe>';
                else previewBody.innerHTML = '<p>Cannot preview. <a href="' + url + '" target="_blank" style="color:var(--accent);">Open in new tab</a></p>';
            } else {
                previewBody.innerHTML = '<p>Preview not available. <a href="' + url + '" target="_blank" style="color:var(--accent);">Open in new tab</a></p>';
            }
        } else {
            // Local file - get blob
            const blob = await StorageManager.getBlob(itemId);
            if (!blob) { previewBody.innerHTML = '<p>File data not found.</p>'; return; }
            const objectUrl = URL.createObjectURL(blob);
            if (blob.type.startsWith('image/')) {
                const img = new Image();
                img.onload = () => { previewBody.innerHTML = ''; previewBody.appendChild(img); };
                img.src = objectUrl;
            } else if (blob.type === 'application/pdf') {
                previewBody.innerHTML = '<iframe src="' + objectUrl + '" style="width:100%;height:100%;border:none;"></iframe>';
            } else {
                previewBody.innerHTML = '<p>Preview not available for ' + (item.fileName || 'this file') + '.<br><br><a href="' + objectUrl + '" download="' + (item.fileName || 'file') + '" style="color:var(--accent);font-weight:bold;">Download instead</a></p>';
            }
        }
    };
}

function downloadFile(itemId) {
    const tx = db.transaction("files", "readonly");
    tx.objectStore("files").get(itemId).onsuccess = async (e) => {
        const item = e.target.result;
        if (!item) return;

        if (item.url && item.url !== '') {
            const url = item.url;
            if (url.includes('drive.google.com')) {
                const fileId = url.match(/\/d\/([a-zA-Z0-9-_]+)/)?.[1];
                if (fileId) window.open('https://drive.google.com/uc?export=download&id=' + fileId, '_blank');
            } else { window.open(url, '_blank'); }
        } else {
            // Local file - get blob and create download
            const blob = await StorageManager.getBlob(itemId);
            if (!blob) { alert('File data not found'); return; }
            const objectUrl = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = objectUrl;
            link.download = item.fileName || 'download';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            // Revoke after a delay to allow download to start
            setTimeout(() => URL.revokeObjectURL(objectUrl), 5000);
        }
    };
}

function closePreview() {
    document.getElementById('previewModal').classList.remove('show');
    document.getElementById('previewBody').innerHTML = '';
}

if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

async function initApp() {
    try {
        await StorageManager.init();
        // Migrate old data from V9
        await StorageManager.migrateFromV9();
        setupApp();
        render();
    } catch (err) { console.error('Init failed:', err); setupApp(); render(); }
}

function setupApp() {
    const nav = document.getElementById('subjectNav');
    const sel = document.getElementById('subIn');
    const navFrag = document.createDocumentFragment();
    const allSpan = document.createElement('span');
    allSpan.className = 'active';
    allSpan.textContent = 'All Subjects';
    allSpan.onclick = function() { filterSub('All', this); };
    navFrag.appendChild(allSpan);

    const selFrag = document.createDocumentFragment();
    subjectData.forEach(s => {
        const span = document.createElement('span');
        span.textContent = s.icon + ' ' + s.name;
        span.onclick = function() { filterSub(s.name, this); };
        navFrag.appendChild(span);
        const opt = document.createElement('option');
        opt.value = s.name; opt.textContent = s.icon + ' ' + s.name;
        selFrag.appendChild(opt);
    });
    nav.innerHTML = ''; nav.appendChild(navFrag);
    sel.innerHTML = ''; sel.appendChild(selFrag);

    if(isAdmin) {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('loginBtn').innerText = "Logout";
        document.getElementById('loginBtn').onclick = logout;
    }
    if(localStorage.getItem('theme') === 'dark') document.getElementById('themeBtn').innerText = "☀️ Mode";

    // Debounced search
    let searchTimer;
    document.getElementById('searchBar').addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(search, 150);
    });

    // Drag and drop support
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = 'rgba(163,64,84,0.12)'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.background = ''; });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.background = '';
        if (e.dataTransfer.files.length > 0) {
            document.getElementById('fileInput').files = e.dataTransfer.files;
            processFile(document.getElementById('fileInput'));
        }
    });
}

// FIX: No more readAsDataURL - just keep the File object reference (zero memory cost)
function processFile(input) {
    const file = input.files[0];
    if (!file) return;
    
    const maxSize = 5 * 1024 * 1024 * 1024; // 5GB
    if (file.size > maxSize) {
        alert("File exceeds 5GB limit. Please use an external link.");
        return;
    }
    
    uploadedFileBlob = file; // Keep as File/Blob - NO base64 conversion
    uploadedFileName = file.name;
    uploadedFileType = file.type;
    uploadedFileSize = file.size;
    document.getElementById('fileNameDisplay').innerText = "✅ " + file.name + " (" + formatSize(file.size) + ")";
}

async function saveToHub() {
    const title = document.getElementById('title').value;
    const hasFile = uploadedFileBlob !== null;
    const hasLink = document.getElementById('linkIn').value.trim() !== '';
    
    if (!title || (!hasFile && !hasLink)) return alert("Please provide a title and a file or link!");

    const btn = document.getElementById('publishBtn');
    btn.disabled = true;

    const entry = {
        title,
        grade: document.getElementById('gradeIn').value,
        subject: document.getElementById('subIn').value,
        url: hasLink ? document.getElementById('linkIn').value.trim() : '',
        desc: document.getElementById('desc').value,
        type: hasFile ? "Local File" : "Web Link",
        fileName: uploadedFileName || '',
        fileSize: uploadedFileSize,
        fileType: uploadedFileType,
        createdAt: new Date().toISOString()
    };

    try {
        showUploadProgress(true);
        document.getElementById('progressTitle').textContent = hasFile ? '📤 Saving ' + formatSize(uploadedFileSize) + '...' : '📤 Saving...';
        updateUploadProgress(0, hasFile ? '0 / ' + formatSize(uploadedFileSize) : '');

        await StorageManager.saveData(entry, hasFile ? uploadedFileBlob : null, (percent) => {
            updateUploadProgress(percent, hasFile ? formatSize(uploadedFileSize * percent / 100) + ' / ' + formatSize(uploadedFileSize) : '');
        });

        showUploadProgress(false);
        document.getElementById('title').value = '';
        document.getElementById('linkIn').value = '';
        document.getElementById('desc').value = '';
        document.getElementById('fileNameDisplay').innerText = '📂 Click or Drop File Here (up to 5GB)';
        uploadedFileBlob = null; uploadedFileName = ''; uploadedFileType = ''; uploadedFileSize = 0;
        btn.disabled = false;
        render();
    } catch (err) {
        console.error('Save error:', err);
        showUploadProgress(false);
        btn.disabled = false;
        alert('Error saving: ' + err.message);
    }
}

async function render() {
    const cont = document.getElementById('container');
    try {
        const items = await StorageManager.getAllData();
        if (items.length === 0) { cont.innerHTML = '<p class="no-resources">📚 No resources found. Admin can start uploading!</p>'; return; }
        const frag = document.createDocumentFragment();
        let count = 0;
        for (let i = items.length - 1; i >= 0; i--) {
            const item = items[i];
            if ((currentGrade === 'All' || item.grade === currentGrade) && (currentSub === 'All' || item.subject === currentSub)) {
                const sInfo = subjectMap[item.subject];
                const card = document.createElement('div');
                card.className = 'card';
                const sizeStr = item.fileSize ? ' · ' + formatSize(item.fileSize) : '';
                card.innerHTML = '<button class="del-btn" style="' + (isAdmin ? 'display:block' : '') + '" data-id="' + item.id + '">×</button><div class="card-header"><span class="subj-tag">' + (sInfo ? sInfo.icon : '') + ' ' + item.subject + '</span><span class="type-tag">' + item.type + sizeStr + '</span></div><h3>' + item.title + '</h3><p>' + (item.desc || 'No additional notes.') + '</p><div class="btn-group"><button class="btn-preview" data-id="' + item.id + '">👁️ Preview</button><button class="btn-dl" data-id="' + item.id + '">📥 Download</button></div>';
                frag.appendChild(card);
                count++;
            }
        }
        if (count === 0) { cont.innerHTML = '<p class="no-resources">📚 No resources match current filters.</p>'; return; }
        cont.innerHTML = '';
        cont.appendChild(frag);
    } catch (err) { console.error('Render error:', err); }
}

document.getElementById('container').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-id]');
    if (!btn) return;
    const id = Number(btn.dataset.id);
    if (btn.classList.contains('btn-preview')) openPreview(id);
    else if (btn.classList.contains('btn-dl')) downloadFile(id);
    else if (btn.classList.contains('del-btn')) deleteItem(id);
});

function checkAuth() {
    const user = document.getElementById('adminUser').value;
    const pass = document.getElementById('adminPass').value;
    if(admins.find(a => a.u === user && a.p === pass)) { localStorage.setItem('isSideraAdmin', 'true'); location.reload(); }
    else alert("Invalid Credentials!");
}

function logout() { localStorage.removeItem('isSideraAdmin'); location.reload(); }

async function deleteItem(id) {
    if(confirm("Delete this resource?")) {
        try { await StorageManager.deleteData(id); render(); }
        catch (err) { console.error('Delete error:', err); }
    }
}

// FIX: Instant theme toggle - just swap attribute, CSS variables handle the rest
function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    document.getElementById('themeBtn').innerText = isDark ? "🌙 Mode" : "☀️ Mode";
}

function showLogin() { document.getElementById('loginModal').classList.add('show'); }
function hideLogin() { document.getElementById('loginModal').classList.remove('show'); }

function filterGrade(g, el) {
    document.querySelectorAll('#gradeNav span').forEach(s => s.classList.remove('active'));
    el.classList.add('active'); currentGrade = g; render();
}

function filterSub(s, el) {
    document.querySelectorAll('#subjectNav span').forEach(s => s.classList.remove('active'));
    el.classList.add('active'); currentSub = s; render();
}

function search() {
    const v = document.getElementById('searchBar').value.toLowerCase();
    document.querySelectorAll('.card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(v) ? 'flex' : 'none');
}

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closePreview(); hideLogin(); } });

initApp();
</script>
</body>
</html>
